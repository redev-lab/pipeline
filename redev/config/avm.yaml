# avm.yaml — 심장2 AVM 파라미터 (매직넘버 금지, 규칙5). 설계: avm.md.
# ★법정값 아님 — 데이터·도메인 기반 설정. 커버리지·검증 보고 후 조정한다.

target:
  # ★R6: 필지 반경 집계 대지지분 평당단가. 계층 폴백(거짓0↔결측천지 회피).
  radius_levels_m: [50, 100]   # 50m 결측 → 100m → 동 단위 순. agg_level 기록.
  window_years: 3              # 최근 N년 거래만(시세 최신성)
  min_trades: 1                # 집계 최소 거래수(이 미만이면 다음 단계로 폴백)
  agg: median                  # 소수 이상치 강건(평균 아님)

comparable:
  # ★R17 비교신축 시세(아파트). 선택 기준 고정·공개(답을 좌우하므로 숨기지 않음).
  radius_m: 1000               # 비교 대상 아파트 거리
  max_age_years: 10            # 준공 N년 이내 = '신축'
  min_trades: 3                # 비교군 최소 거래수
  agg: median

upside:
  # ★R14 분담금 불투명 → low/mid/high 시나리오 비율(대지지분 매입가 대비). 단정 금지.
  contribution_ratio: { low: 0.3, mid: 0.6, high: 1.0 }
  # TODO: 분담금 비율은 사업단계·용적률·일반분양가에 좌우 — v1 근사(시나리오), v1.1 정교화.
