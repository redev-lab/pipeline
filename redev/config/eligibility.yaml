# eligibility.yaml — 진입 가능성 룩업 (수시변경 규제값, 규칙5). 설계: eligibility.md.
# ============================================================================
# ★★★ 토허(토지거래허가)는 휘발성 최상급 규제다 — 수시 지정·해제됨.
#   아래 값은 2026.06 근사. 출력에 기준시점을 반드시 표기하고, 매 사용 시 국토부/서울시
#   고시 원문으로 현행을 재확인하라. ★상업 배포 전 법률 검토 필수(R15). 숫자는 LLM이
#   짓지 않는다(규칙4) — 이 파일의 값도 검증 대상.
# ============================================================================

toheo:
  basis_date: "2026-06"           # 이 값들의 기준 시점(출력에 표기)
  default_applies: true           # 서울 전역 기본 적용(2025.10 대책 — 구역 멤버십 아님)
  # 물건유형 분기(2025.10 대책 보도자료: 아파트 + '단지 내 아파트 1개동 이상 포함' 연립·다세대)
  apartment_always: true          # 아파트 = 항상 토허 대상
  villa_requires_danji: true      # 연립·다세대 = 단지요건(단지 내 아파트 동 포함) 충족 시만
  residence_duty: true            # 토허 대상 = 실거주 의무 → 갭투자 불가
  # TODO(★최강 경고): 토허는 분기마다 지정·해제·요건이 바뀐다. 위는 2026.06 근사.
  #   현행은 고시 원문 재확인. 상업 배포 전 법률 검토 필수(R15).

# 단계 → 예상 잔여기간(년). ★예언(§6) — 범위·변동 큼, 단정 금지. 외생변수(R18)가 좌우.
stage_remaining_years:
  조합설립인가: { min: 7, max: 15, typical: 10 }
  사업시행인가: { min: 4, max: 9,  typical: 6 }
  관리처분인가: { min: 2, max: 5,  typical: 3 }
  착공:        { min: 2, max: 4,  typical: 3 }
  준공:        { min: 0, max: 1,  typical: 0 }
  # ★단계별 잔여기간 = 통념 근사(유지 결정). 2026-06-13 가치검증 측정 결과 '언제 모델'은
  #   데이터로 정당화 안 됨: ① 단계전이 타임스탬프 0건(결정고시는 도시계획 결정/실시/지적뿐,
  #   정비단계 고시 없음) ② 정비사업 데이터(163구역)는 '마지막 고시 후 경과'(우측절단·정체 프록시,
  #   완공소요 아님)+규모 결측 90%(16/163) ③ 그 프록시에서도 피처가 통념 대비 +9.6%(MAE 4.15년,
  #   상대 ~50%)뿐. → 모델 만들지 말고 이 통념 범위를 정직하게 표시. 외생 천장은 R18.
  #   재검토 조건: 정보몽땅 단계별 일자 또는 완공일 확보 → 재측정.
