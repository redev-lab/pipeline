# features.yaml — v1.1 직교 피처 설정 (규칙5). 설계: features_v1_1.md.

zoning:
  # 용도지역 세분류(AL_D124 A6) → ordinal. ★순서 근거: 주거밀도·개발가치 단조 증가
  #   (1종전용<2종전용<1종일반<2종일반<3종일반<준주거<상업). 트리·GNN 둘 다 단조축 OK.
  ordinal:
    제1종전용주거지역: 1
    제2종전용주거지역: 2
    제1종일반주거지역: 3
    제2종일반주거지역: 4
    제3종일반주거지역: 5
    준주거지역: 6
    근린상업지역: 7
    유통상업지역: 7
    일반상업지역: 8
    중심상업지역: 9
  # ★순서에 안 끼는 지역(녹지·공업·관리·도시지역 등)은 낮은 끝(0) 고정 — 재개발 관련성 낮음.
  #   (매핑 표가 코드에 흩어지지 않게 여기 한 곳. 공간조인 미스는 zoning_missing 플래그로 별도.)
  default_other: 0

  # ★2026 스냅샷 한계(labels §13): 과거 라벨에 붙이면 종상향 역류 가능 — 근사 수용,
  #   leakage_ablation으로 영향 측정. 연도별 용도지역 이력 미보유(v2).

  # stage1 저밀이용 정석화용 — 세분류별 법정 상한 용적률(%) 근사. TODO: 서울시 조례 원문 재확인.
  far_limit_pct:
    제1종전용주거지역: 100
    제2종전용주거지역: 150
    제1종일반주거지역: 200
    제2종일반주거지역: 250
    제3종일반주거지역: 300
    준주거지역: 500
    근린상업지역: 900
    일반상업지역: 1300
    중심상업지역: 1500

rail:
  # ★역세권 거리 as-of-t 필터용 노선 개통연도. 시점정합 관건 = 라벨창(2001~2025) 내 개통 노선만
  #   (그 전 노선은 모든 라벨보다 앞서 항상 포함). 표에 없는 노선 = default_pre(2001 이전) 가정.
  #   ★각 연도 공신력 출처(나무위키 노선별 문서 — 공개 기록, 추정 아님). 정밀 '역별' 개통일
  #   데이터셋은 미발견(조사 확정) → 노선 단위 근사(open_year_source=compiled). v2: 역별 개통일.
  line_open_year:
    9호선: 2009                 # namu.wiki/w/9호선 (1단계 2009.7)
    9호선(연장): 2015
    우이신설선: 2017            # namu.wiki/w/우이신설선 (2017.9)
    신림선: 2022                # namu.wiki/w/신림선 (2022.5)
    수도권 광역급행철도: 2024    # GTX-A (2024)
    신분당선: 2011
    신분당선(연장): 2016
    신분당선(연장2): 2022
    서해선: 2018
    별내선: 2024
    진접선: 2022
    김포골드라인: 2019
    경강선: 2016
    인천2호선: 2016
    에버라인선: 2013
    수인선: 2012
  default_pre_year: 2000        # 표에 없는 노선 = 2001 이전 개통(라벨창 전부보다 앞 → 항상 포함)
  radius_norm_m: 1000           # 역세권 거리 정규화 기준(~1km)
