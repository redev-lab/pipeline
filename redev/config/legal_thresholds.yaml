# legal_thresholds.yaml — 법정 임계값 단일 출처 (CLAUDE.md 규칙5)
# ===========================================================================
# 코드 안에 60, 40 같은 매직넘버를 박지 않는다. 모든 임계값은 여기서 읽고,
# rules/stage1.py 등이 redev.config.load_thresholds() 로만 접근한다.
#
# ★중요(정직성): 아래 값은 "기획안 기준값"이다. 정확한 조항 번호와 현행
#   수치는 법령·조례 개정에 따라 바뀐다. 각 블록의 TODO는 구현 착수 시점에
#   현행 도시정비법 시행령 / 서울시 조례 원문으로 반드시 재확인하라는 뜻이다.
#   숫자는 LLM이 짓지 않는다(규칙4) — 이 파일의 값도 검증 대상이다.
#
# 주요 출처(일반):
#   - 도시 및 주거환경정비법(이하 '도정법') 및 같은 법 시행령 [별표1]
#       = 정비계획 입안 대상지역 요건
#   - 서울특별시 도시 및 주거환경정비 조례 [별표1] 및 관련 조문
#       = 노후·불량건축물 기준, 호수밀도·접도율·과소필지 등 구체 수치
# ===========================================================================

# ---------------------------------------------------------------------------
# 1. 노후·불량 건축물 판정 (노후도 산정의 기반)
#    노후도(%)는 개별 건물의 '노후·불량 여부'를 필지/구역 단위로 집계한 값.
#    출력에는 "사용승인일 기반 근사치"임을 반드시 명시한다(Phase 4).
# ---------------------------------------------------------------------------
building_aging:
  # 철근콘크리트(RC)·철골조 등 내구성 구조: 준공 후 경과연수 기준
  rc_years: 30          # (년) 이상이면 노후로 본다
  # 그 외 구조(조적조·목조 등)
  other_years: 20       # (년) 이상이면 노후로 본다
  # TODO(구현 착수 시 재확인): 서울시 도시 및 주거환경정비 조례의
  #   노후·불량건축물 경과연수 기준. 구조별 연수와 '20~30년 범위 내 조례
  #   위임' 여부를 현행 조문으로 확정할 것. (도정법 제2조 정의 + 시행령 +
  #   서울시 조례 별표) — 정확한 조 항 번호 미확정.

# ---------------------------------------------------------------------------
# 2. 주택정비형 재개발 (구역 지정 요건) — 면적 요건 + 아래 중 1 이상 충족
# ---------------------------------------------------------------------------
housing_redevelopment:
  # 노후·불량건축물 연면적 비율 (구역 전체 연면적 대비)
  old_building_area_ratio: 0.60      # 60% 이상
  # 재정비촉진지구(촉진지구)는 완화된 기준 적용
  old_building_area_ratio_promotion: 0.50   # 촉진지구 50% 이상
  # 접도율 (구역 내 일정 폭 도로에 접한 필지 비율) — '낮을수록' 정비 필요
  abutting_road_ratio_max: 0.40      # 40% 이하
  # 호수밀도 (헥타르당 건축물 동수) — '높을수록' 과밀·노후
  house_density_min: 60              # 60(동/ha) 이상
  # TODO(구현 착수 시 재확인): 도정법 시행령 [별표1] 주거환경 정비 요건 +
  #   서울시 조례. ⓐ 접도율의 정확한 정의(기준 도로폭 4m? 6m?)와 분모,
  #   ⓑ 호수밀도 단위·기준, ⓒ 촉진지구 완화율, ⓓ 면적 요건(예: 1만㎡)을
  #   현행 원문으로 확정. 조 항/별표 번호 미확정.

# ---------------------------------------------------------------------------
# 3. 도시정비형 재개발 — 아래 3개 중 2개 이상 충족
# ---------------------------------------------------------------------------
urban_redevelopment:
  old_building_ratio: 0.30           # 노후도 30% 이상
  undersized_lot_ratio: 0.40         # 과소필지 비율 40% 이상
  low_density_use_ratio: 0.50        # 저밀이용(저층·저밀) 비율 50% 이상
  required_count: 2                  # 위 3개 중 충족해야 하는 최소 개수
  # TODO(구현 착수 시 재확인): 도정법 시행령 [별표1] 상업·공업지역 등
  #   도시정비형 요건. ⓐ 과소필지의 면적 정의(예: 90㎡ 미만),
  #   ⓑ 저밀이용 정의(법정 용적률 대비 비율 등), ⓒ '2개 이상' 충족 규칙을
  #   현행 원문으로 확정. 조 항/별표 번호 미확정.

# ---------------------------------------------------------------------------
# 4. GNN 라벨 위생 컷 (★데이터 지뢰 §5-2 방어)
#    철거·신축 완료된 정비구역은 현재 건물이 신축이라 노후도가 낮게 찍힌다.
#    이런 라벨=1을 학습하면 GNN이 "정비구역인데 안 낡았네"를 배워 진짜
#    후보지를 놓친다(False Negative). EDA에서 이 컷 미만 라벨=1을 오염
#    데이터 drop 후보로 식별한다(Phase 1에서는 목록만, 삭제는 검토 후).
# ---------------------------------------------------------------------------
label_hygiene:
  min_old_ratio_for_positive: 0.50   # 라벨=1인데 노후도 50% 미만 → 오염 의심
  # TODO(구현 착수 시 재확인): 이 컷(0.50)은 법정값이 아니라 EDA 휴리스틱이다.
  #   실제 라벨 분포를 보고 조정한다(법 출처 아님, 데이터 기반 결정).

# ---------------------------------------------------------------------------
# 5. 파생 네거티브 컷 (★데이터 기반 — 법정값 아님, labels.py §4.6)
#    신축파생/노후미지정 네거티브를 노후도로 가르는 컷. as-of-현재 노후도 기준.
#    ★근거: 4구 노후도 분포가 bimodal — <0.2에 29,190필지, ≥0.7에 63,015필지,
#    그 사이(0.2~0.5)엔 단 73필지(자연 gap). 0.2 컷이 gap 한가운데라 데이터로
#    정당화됨. 0.2~0.5 모호대역(~73필지)은 미라벨/제외.
# ---------------------------------------------------------------------------
newbuild:                       # 신축파생 reliable_negative
  max_old_ratio: 0.20           # 필지 as-of-현재 노후도가 이 미만 → 신축파생 neg
  # TODO: v2 서울 전역 분포로 bimodal 갭·컷 재확인.

undesignated:                   # 노후미지정 uncertain (R4 미확정)
  min_old_ratio: 0.50           # 노후도 이 이상 & 미지정 → 노후미지정 uncertain
  # (0.2~0.5 사이는 모호대역으로 제외. label_hygiene 컷과 동일 0.50 의도적 일치.)
