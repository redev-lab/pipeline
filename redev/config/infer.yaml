# infer.yaml — 추론 출력 파라미터 (매직넘버 금지, 규칙5). 설계: pipeline.md.

cluster:
  # 넓은 클러스터: Phase 3 OOF best-F1 운영점(★검증된 임계값, 코드서 산출).
  # 타이트 클러스터: 점수 상위 백분위(★표시용·미검증 컷 — 0.97 포화 확률의 사용성 보강).
  tight_top_pct: 10        # 상위 N% 점수만(타이트 후보)
  min_nodes: 5             # 최소 클러스터 크기(고립 고확률 제거)
  # ★신뢰도 밴드: |점수 − 운영임계값(thr≈0.62)| 가 이 값 미만이면 '저신뢰'(애매), 이상이면 '고신뢰'
  #   (확실히 높음/낮음). 점수 최하위(0.058)가 '저신뢰'로 역전되던 버그 수정. thr 폭에 맞춰 조정.
  confidence_margin: 0.15

polygon:                   # (보너스) 매끈 폴리곤 후처리(R12). 도로 스냅핑은 v1.1.
  buffer_m: 3              # 합집합 닫힘 버퍼
  min_area_m2: 500         # 최소 면적

heatmap:
  # ★raw 확률(81% 노드가 0.97 포화 → 온통 빨강, 정보 0)이 아니라 백분위로 표시.
  #   "상대적으로 어디가 더 노후 환경인가" + Phase 5 "상위 X%" 출력 언어 통일.
  display: percentile

region_grow:               # B0 무학습 바닥선(R13 IoU 좌표축). 현재 노후도 기준.
  seed_cut: 0.6            # 노후도≥ 이 값이면 확장 seed
  grow_cut: 0.4            # 노후도≥ 이 값이면 인접 확장 대상
  # TODO: 컷은 수검(클러스터 분포)으로 조정 — 법정값 아님(노후도 분포 기반).
