# graph.yaml — 인접 그래프 구성 파라미터 (매직넘버 금지, 규칙5 철학)
# 설계: docs/design/graph.md

node_jimok:
  # ★수정1: 노드에서 제외할 비주거 지목 (연속지적도 A5 끝글자).
  #   도로·하천·구거·철도·제방·유지가 길게 뻗어 수백 필지와 touches → 슈퍼허브 노드 →
  #   메시지가 블록 경계를 넘어 번진다(graph.md §2). 공원·수도용지·묘지는 비재개발.
  #   4구 실측 분포: 대 74.7% / 도(도로) 15.6%(슈퍼허브) / 임 3.3% / 구·천·철 각 0.6~0.8%.
  exclude: ["도", "천", "구", "철", "제", "유", "공", "수", "묘"]
  # ★임/전/답은 노드로 유지 (측정 근거, graph.md §3): positive 라벨에 임/전/답 379필지
  #   (산동네 재개발)가 겹쳐, blanket 제외하면 positive 2,728 손실. 건물 override도 도로+건물
  #   = 657 슈퍼허브 재생성으로 역효과(측정 확인). 남는 forest 1개(max degree 149)는
  #   2층 GNN에 영향 제한적 → 수용. size-기반 hub guard는 v1.1.
  building_overrides_jimok: false   # ★측정상 역효과(657 허브) → off. 코드는 둠(미래용).

edge:
  # 도로로 갈린 필지 연결용 버퍼(블록 연결성). 도로는 노드가 아니라 '다리'(graph.md §2).
  # 0이면 strict touches(도로=블록 경계). 양수면 ~2*buffer 폭 도로/골목을 잇는다.
  buffer_m: 2.0
  # TODO: 버퍼폭은 수검(연결성·degree 분포)으로 조정. 2m=좁은 골목(≤4m) 다리 가정.

density:
  # 국지 호수밀도(건물동수/면적) 반경. R6(빌라 집계 ~50m)와 정렬.
  radius_m: 50
